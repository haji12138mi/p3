  useEffect(()=>{if(!hasLoadedSave)return;const now=new Date();if(now.getDay()!==0)return;const today=getLocalDateISO(now);const already=localStorage.getItem(WEEKLY_AMBITION_PENALTY_KEY)||weeklyAmbitionPenaltyDate;if(already===today)return;localStorage.setItem(WEEKLY_AMBITION_PENALTY_KEY,today);setWeeklyAmbitionPenaltyDate(today);setStats(prev=>{const next={...prev,ambition:round2(clamp(prev.ambition-.1,0,100))};recordHistory(next);return next});addSystemLog("周日结算：进取心 -0.1。")},[hasLoadedSave,weeklyAmbitionPenaltyDate]);

  const readBook=()=>{const snapshot=createSnapshot(),minutes=Math.max(0,toNum(actionMinutes.readBook,60)),ratio=minutes/60,knowledgeGain=round2(.01*ratio),pointGain=round2(1*ratio);addStats({knowledge:knowledgeGain});changePoints(pointGain,"读书");addLog(`读书 ${minutes} 分钟：知识 +${knowledgeGain}，积分 +${pointGain}。`,snapshot)};
  const learnLanguage=()=>{const snapshot=createSnapshot(),minutes=Math.max(0,toNum(actionMinutes.learnLanguage,60)),ratio=minutes/60,expGain=round2(.01*ratio),pointGain=round2(1*ratio);addSkillExp("外语",expGain);changePoints(pointGain,"学外语");addLog(`学外语 ${minutes} 分钟：外语技能经验 +${expGain}，积分 +${pointGain}。`,snapshot)};
  const learnSelectedSkill=()=>{const snapshot=createSnapshot(),minutes=Math.max(0,toNum(actionMinutes.learnSkill,60)),ratio=minutes/60,expGain=round2(.01*ratio),pointGain=round2(1*ratio);addSkillExp(selectedSkill,expGain);changePoints(pointGain,"学技能");addLog(`学技能 ${minutes} 分钟：${selectedSkill} 技能经验 +${expGain}，积分 +${pointGain}。`,snapshot)};
  const lightWorkout=()=>{const snapshot=createSnapshot();addStats({health:.02,ambition:.02});addSkillExp("健身",.02);changePoints(1,"轻度运动");addLog("轻度运动：健康 +0.02，进取心 +0.02，健身技能经验 +0.02，积分 +1。",snapshot)};
  const mediumWorkout=()=>{const snapshot=createSnapshot();addStats({health:.05,ambition:.05});addSkillExp("健身",.05);changePoints(1,"中度运动");addLog("中度运动：健康 +0.05，进取心 +0.05，健身技能经验 +0.05，积分 +1。",snapshot)};
  const sing=()=>{const snapshot=createSnapshot();addSkillExp("唱歌",.01);changePoints(1,"唱歌");addLog("唱歌：唱歌技能经验 +0.01，积分 +1。",snapshot)};
  const redeem=(item)=>{if(points<item.cost)return;const snapshot=createSnapshot();changePoints(-item.cost,`兑换：${item.name}`);setRedeemed(prev=>[{id:makeId(),name:item.name,cost:item.cost,date:getTodayText()},...prev]);addLog(`兑换成功：${item.name}，消耗 ${item.cost} 积分。`,snapshot)};
  const addCustomSkill=()=>{const name=newSkillName.trim();if(!name||skills[name])return;const snapshot=createSnapshot();setSkills(prev=>({...prev,[name]:{levelIndex:0,exp:0}}));setNewSkillName("");addLog(`已添加技能：${name}。`,snapshot)};
  const addCustomAction=()=>{if(!customAction.name.trim())return;const snapshot=createSnapshot();setCustomActions(prev=>[...prev,{id:makeId(),name:customAction.name.trim(),stat:customAction.stat,skill:customAction.skill,statAmount:toNum(customAction.statAmount),skillAmount:toNum(customAction.skillAmount),points:toNum(customAction.points,1),unit:customAction.unit}]);addLog(`已添加自定义行动：${customAction.name.trim()}。`,snapshot)};
  const runCustomAction=(action,index)=>{const snapshot=createSnapshot(),multiplier=action.unit==="hour"?Math.max(0,toNum(customActionRunHours[index],1)):1,statDelta=round2(action.statAmount*multiplier),skillDelta=round2(action.skillAmount*multiplier),pointDelta=round2(action.points*multiplier);if(action.stat!=="none")addStats({[action.stat]:statDelta});if(action.skill!=="none")addSkillExp(action.skill,skillDelta);changePoints(pointDelta,action.name);const statText=action.stat!=="none"?`${statLabels[action.stat]} ${statDelta>=0?"+":""}${statDelta}`:"",skillText=action.skill!=="none"?`${action.skill}技能经验 ${skillDelta>=0?"+":""}${skillDelta}`:"";addLog(`${action.name}：${action.unit==="hour"?`${multiplier} 小时，`:""}${[statText,skillText].filter(Boolean).join("，")}，积分 ${pointDelta>=0?"+":""}${pointDelta}。`,snapshot)};
  const moveCustomAction=(index,direction)=>setCustomActions(prev=>{const next=[...prev],target=index+direction;if(target<0||target>=next.length)return prev;[next[index],next[target]]=[next[target],next[index]];return next});
  const addCustomReward=()=>{if(!customReward.name.trim())return;const snapshot=createSnapshot(),cost=Math.max(1,round2(toNum(customReward.cost,1)));setShopItems(prev=>[...prev,{name:customReward.name.trim(),cost}]);addLog(`已添加兑换奖励：${customReward.name.trim()}，需要 ${cost} 积分。`,snapshot)};
  const addLedgerItem=()=>{const name=ledgerForm.name.trim(),amount=round2(toNum(ledgerForm.amount,0)),date=ledgerForm.date||getLocalDateISO();if(!name||amount<=0){addSystemLog("请输入有效的记账项目和金额。");return}setLedger(prev=>[{id:makeId(),date,name,amount,undone:false},...prev]);setLedgerForm(prev=>({...prev,name:"",amount:""}))};
  const undoLedgerItem=(id)=>setLedger(prev=>prev.map(i=>i.id===id?{...i,undone:true}:i));
  const exportData=()=>{const saveData={stats,skills,paperProgress,paperAccepted,points,weightInput,weightPointsApplied,weightHealthApplied,dailyGain,actionMinutes,selectedSkill,openActionHint,log,redeemed,pointHistory,history,customAction,customActions,customActionRunHours,newSkillName,customReward,shopItems,ledgerForm,ledgerMonth,ledger,pageColor,weeklyAmbitionPenaltyDate};const blob=new Blob([JSON.stringify(saveData,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`地球online读博版备份-${getLocalDateISO()}.json`;a.click();URL.revokeObjectURL(url)};
  const importData=(event)=>{const file=event.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=(e)=>{try{const p=JSON.parse(e.target.result);localStorage.setItem(SAVE_KEY,JSON.stringify(p));window.location.reload()}catch(err){alert("导入失败：文件格式不正确。")}};reader.readAsText(file);event.target.value=""};
  const clearSaveData=()=>{if(!confirm("确定要清空所有保存数据吗？这个操作不能撤回。"))return;localStorage.removeItem(SAVE_KEY);localStorage.removeItem(WEEKLY_AMBITION_PENALTY_KEY);window.location.reload()};
  const actionButtons=[{label:"读文献",onClick:readLiterature,hint:"科研经验 +0.01，进取心 +0.01。科研和进取心每日最多各加 0.1。积分 +1。"},{label:"写论文",onClick:writePaper,hint:`当前论文进度 ${paperProgress}%。每次：科研经验 +0.01，进取心 +0.01，积分 +1。完成一篇后额外获得科研经验 +1，进取心 +1。`},{label:"读书",key:"readBook",onClick:readBook,hint:"按分钟结算。60 分钟：知识 +0.01，积分 +1。"},{label:"学外语",key:"learnLanguage",onClick:learnLanguage,hint:"按分钟结算。60 分钟：外语技能经验 +0.01，积分 +1。"},{label:"学技能",key:"learnSkill",onClick:learnSelectedSkill,hint:`按分钟结算。60 分钟：${selectedSkill} 技能经验 +0.01，积分 +1。`,needSkillSelect:true},{label:"轻度运动",onClick:lightWorkout,hint:"健康 +0.02，进取心 +0.02，健身技能经验 +0.02，积分 +1。"},{label:"中度运动",onClick:mediumWorkout,hint:"健康 +0.05，进取心 +0.05，健身技能经验 +0.05，积分 +1。"},{label:"唱歌",onClick:sing,hint:"唱歌技能经验 +0.01，积分 +1。"}];

  return <main className="page" style={{backgroundColor:selectedPageColor}}><div className="phone"><section className="hero" style={{backgroundColor:selectedPageColor}}><h1>地球online 读博版</h1></section><div className="content">
    {tab==="dashboard"&&<><div className="card"><h2 className="title">人物属性</h2><StatBar label="体重" value={stats.weight} max={INITIAL_WEIGHT} suffix=" 斤"/><StatBar label="健康值" value={stats.health}/><StatBar label="知识" value={stats.knowledge}/><StatBar label="进取心" value={stats.ambition}/></div><div className="grid2">{orderedSkillEntries.map(([name,skill])=><SkillCard key={name} name={name} skill={skill}/>)}</div><div className="spacer"/><div className="card"><h2 className="title">属性成长曲线</h2><SimpleChart data={history} keys={["health","knowledge","ambition"]} labels={{health:"健康",knowledge:"知识",ambition:"进取心"}} maxFixed={100}/></div><div className="card"><h2 className="title">体重曲线</h2><SimpleChart data={history} keys={["weight"]} labels={{weight:"体重"}} maxFixed={INITIAL_WEIGHT}/></div><div className="card"><h2 className="title">成长日志</h2>{log.slice(0,8).map(item=><div key={item.id} className={`log ${item.undone?"muted":""}`}><div>{item.message}</div>{item.snapshot&&!item.undone&&<button className="btn outline small" onClick={()=>undoLogItem(item.id)}>撤回</button>}</div>)}</div></>}
    {tab==="actions"&&<><div className="card compact"><div className="row"><div style={{flex:1}}><MiniInput label="当前体重（斤）" type="number" value={weightInput} onChange={setWeightInput} placeholder="例如：154"/></div><button onClick={updateCurrentWeight} className="btn">更新</button></div></div><div className="card"><h2 className="title">今日行动</h2><div className="sectionNote">读文献今日加成：科研 {dailyGain.readPaperResearch}/0.1，进取心 {dailyGain.readPaperAmbition}/0.1</div><div className="spacer"/>{actionButtons.map((action,index)=>{const needMinutes=["readBook","learnLanguage","learnSkill"].includes(action.key);const isOpen=openActionHint===index;return <div key={action.label} className="action"><div className="between"><button className="linkBtn" onClick={()=>setOpenActionHint(p=>p===index?null:index)}>{action.label}</button>{!needMinutes&&<button className="btn small" onClick={action.onClick}>完成</button>}</div>{isOpen&&<div className="hint">{action.hint}</div>}{needMinutes&&<div className="row" style={{marginTop:8,alignItems:"end"}}>{action.needSkillSelect&&<div style={{width:100}}><label className="label">技能</label><SelectBox value={selectedSkill} onChange={setSelectedSkill}>{skillNames.map(n=><option key={n} value={n}>{n}</option>)}</SelectBox></div>}<div style={{flex:1}}><label className="label">分钟</label><input className="input" type="number" value={actionMinutes[action.key]} onChange={e=>setActionMinutes(p=>({...p,[action.key]:e.target.value}))}/></div><button className="btn small" onClick={action.onClick}>完成</button></div>}</div>})}</div></>}
    {tab==="shop"&&<><div className="card"><div className="between"><h2 className="title" style={{margin:0}}>积分兑换</h2><span className="badge">{points} 积分</span></div>{[...shopItems].sort((a,b)=>a.cost-b.cost).map(item=><ShopItem key={`${item.name}-${item.cost}`} item={item} points={points} onRedeem={redeem}/>)}</div><div className="card"><h2 className="title">已兑换奖励</h2>{redeemed.length===0?<div className="sectionNote">还没有兑换。继续行动积累积分。</div>:redeemed.map(item=><div key={item.id} className="lineItem"><b>{item.name}</b><div className="small">兑换日期：{item.date} ｜ 消耗 {item.cost} 积分</div></div>)}</div><div className="card"><h2 className="title">积分变化过程</h2>{pointHistory.map(item=><div key={item.id} className="lineItem"><div className="between"><b>{item.reason}</b><b className={item.change>=0?"good":"danger"}>{item.change>=0?"+":""}{item.change}</b></div><div className="small">{item.date} ｜ {item.before} → {item.after}</div></div>)}</div></>}
    {tab==="ledger"&&<><div className="card"><div className="between"><h2 className="title" style={{margin:0}}>记账</h2><input className="input" style={{width:130}} type="month" value={ledgerMonth} onChange={e=>setLedgerMonth(e.target.value)}/></div><div className="grid3" style={{marginTop:10}}><input className="input" type="date" value={ledgerForm.date} onChange={e=>setLedgerForm(p=>({...p,date:e.target.value}))}/><input className="input" placeholder="项目" value={ledgerForm.name} onChange={e=>setLedgerForm(p=>({...p,name:e.target.value}))}/><input className="input" type="number" placeholder="金额" value={ledgerForm.amount} onChange={e=>setLedgerForm(p=>({...p,amount:e.target.value}))}/></div><button className="btn" style={{width:"100%",marginTop:10}} onClick={addLedgerItem}>添加记账</button><div className="grid2" style={{marginTop:10}}><div className="sectionNote"><div>本日花费</div><h2>{todaySpend} 元</h2></div><div className="sectionNote"><div>本月花费</div><h2>{monthSpend} 元</h2></div></div></div><div className="card"><h2 className="title">日历花费</h2><div className="calendar tiny">{["日","一","二","三","四","五","六"].map(d=><div key={d}>{d}</div>)}</div><div className="calendar">{calendarDays.map(item=>item.type==="blank"?<div key={item.id}/>:<div key={item.day} className="day"><b>{item.day}</b>{item.spend>0&&<div className="danger tiny">{item.spend}</div>}</div>)}</div></div><div className="card"><h2 className="title">本月明细</h2>{monthLedger.length===0?<div className="sectionNote">本月还没有记账。</div>:monthLedger.map(item=><div key={item.id} className={`log ${item.undone?"muted":""}`}><div><b className={item.undone?"mutedText":""}>{item.name}</b><div className="small">{item.date} ｜ {item.amount} 元{item.undone?" ｜ 已撤销":""}</div></div>{!item.undone&&<button className="btn outline small" onClick={()=>undoLedgerItem(item.id)}>撤销</button>}</div>)}</div></>}
    {tab==="custom"&&<><div className="card compact"><h2 className="title">自定义技能</h2><MiniInput label="技能名称" value={newSkillName} onChange={setNewSkillName} placeholder="例如：统计学"/><button className="btn" style={{width:"100%",marginTop:8}} onClick={addCustomSkill}>添加技能</button></div><div className="card compact"><h2 className="title">自定义行动</h2><MiniInput label="行动名称" value={customAction.name} onChange={v=>setCustomAction(p=>({...p,name:v}))} placeholder="例如：早睡"/><div className="grid2"><div><label className="label">结算方式</label><SelectBox value={customAction.unit} onChange={v=>setCustomAction(p=>({...p,unit:v}))}>{unitOptions.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</SelectBox></div><div><label className="label">影响属性</label><SelectBox value={customAction.stat} onChange={v=>setCustomAction(p=>({...p,stat:v}))}><option value="none">不影响属性</option>{statOptions.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</SelectBox></div></div><MiniInput label={customAction.unit==="hour"?"每小时属性变化":"属性变化"} type="number" value={customAction.statAmount} onChange={v=>setCustomAction(p=>({...p,statAmount:v}))} placeholder="0.02"/><div className="grid2"><div><label className="label">影响技能</label><SelectBox value={customAction.skill} onChange={v=>setCustomAction(p=>({...p,skill:v}))}><option value="none">不影响技能</option>{skillNames.map(n=><option key={n} value={n}>{n}</option>)}</SelectBox></div><MiniInput label={customAction.unit==="hour"?"每小时技能经验":"技能经验"} type="number" value={customAction.skillAmount} onChange={v=>setCustomAction(p=>({...p,skillAmount:v}))} placeholder="0.02"/></div><MiniInput label={customAction.unit==="hour"?"每小时获得积分":"获得积分"} type="number" value={customAction.points} onChange={v=>setCustomAction(p=>({...p,points:v}))} placeholder="1"/><button className="btn" style={{width:"100%",marginTop:8}} onClick={addCustomAction}>添加行动</button>{customActions.map((action,index)=><div key={action.id} className="action"><div className="between"><div><b>{action.name}</b><div className="small">{action.stat!=="none"&&`${statLabels[action.stat]} ${action.statAmount>=0?"+":""}${action.statAmount}${action.unit==="hour"?"/小时":""}`}{action.stat!=="none"&&action.skill!=="none"?"，":""}{action.skill!=="none"&&`${action.skill}技能经验 ${action.skillAmount>=0?"+":""}${action.skillAmount}${action.unit==="hour"?"/小时":""}`}，积分 {action.points>=0?"+":""}{action.points}{action.unit==="hour"?"/小时":""}</div></div><div><button className="btn outline small" disabled={index===0} onClick={()=>moveCustomAction(index,-1)}>↑</button><button className="btn outline small" disabled={index===customActions.length-1} onClick={()=>moveCustomAction(index,1)}>↓</button></div></div>{action.unit==="hour"&&<MiniInput label="本次执行时间（小时）" type="number" value={customActionRunHours[index]??""} onChange={v=>setCustomActionRunHours(p=>({...p,[index]:v}))} placeholder="例如：1.5"/>}<button className="btn" style={{width:"100%",marginTop:8}} onClick={()=>runCustomAction(action,index)}>完成行动</button></div>)}</div><div className="card compact"><h2 className="title">自定义兑换</h2><MiniInput label="奖励名称" value={customReward.name} onChange={v=>setCustomReward(p=>({...p,name:v}))} placeholder="例如：奶茶"/><MiniInput label="需要积分" type="number" value={customReward.cost} onChange={v=>setCustomReward(p=>({...p,cost:v}))} placeholder="80"/><button className="btn" style={{width:"100%",marginTop:8}} onClick={addCustomReward}>添加奖励</button></div><div className="card compact"><h2 className="title">自定义页面颜色</h2><div className="row" style={{alignItems:"end"}}><input type="color" className="colorInput" value={selectedPageColor} onChange={e=>setPageColor(e.target.value)}/><div style={{flex:1}}><MiniInput label="颜色值" value={selectedPageColor} onChange={setPageColor} placeholder="#020617"/></div></div></div><div className="card compact"><h2 className="title">数据管理</h2><div className="grid3"><button className="btn small" onClick={exportData}>导出数据</button><label className="fileLabel">导入数据<input type="file" accept=".json,application/json" style={{display:"none"}} onChange={importData}/></label><button className="btn outline small" onClick={clearSaveData}>清空数据</button></div><div className="sectionNote" style={{marginTop:8}}>数据会自动保存在当前浏览器。长期使用建议定期点“导出数据”备份。</div></div></>}
  </div><div className="tabs"><div className="tabsInner">{[["dashboard","面板"],["actions","行动"],["shop","兑换"],["ledger","记账"],["custom","自定义"]].map(([id,label])=><button key={id} className={`tab ${tab===id?"active":""}`} onClick={()=>setTab(id)}>{label}</button>)}</div></div></div></main>
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
